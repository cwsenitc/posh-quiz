<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IWD'26 Quiz | CWSE - NITC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans no-select">

    <div id="welcome-screen" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-indigo-600">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">IWD'26 Quiz</h1>
            <p class="text-slate-500 text-sm">By CWSE, NITC</p>
            <p class="text-slate-300 text-sm italic">08, March, 2026</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="userName" placeholder="Full Name" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="text" id="rollNo" placeholder="Roll Number (e.g. B210xxxEE)" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="email" id="userEmail" placeholder="Email ID" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            
            <div id="status-box" class="pt-4 text-center">
                <div id="wait-msg" class="p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 font-medium">
                    <span class="animate-pulse">⏳</span> Wait for Admin to enable...
                </div>
                <button id="start-btn" onclick="startQuiz()" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition">
                    Start Quiz (<span id="set-time-display">10</span> Mins)
                </button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl relative">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <span id="q-count" class="font-bold text-indigo-600 uppercase text-xs tracking-widest italic">Question 1</span>
            <div id="timer" class="text-2xl font-black text-red-600 font-mono">--:--</div>
        </div>
        <div id="quiz-content" class="mb-10 min-h-[150px]">
            <h2 id="q-text" class="text-xl font-bold text-slate-800 mb-6 leading-tight"></h2>
            
            <div id="mcq-container" class="grid gap-3"></div>
            
            <div id="typing-container" class="hidden space-y-4">
                <input type="text" id="typing-input" placeholder="Type your answer here..." class="w-full p-4 border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 font-semibold text-lg">
                <button onclick="submitTypedAnswer()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">Next Question</button>
            </div>
        </div>
    </div>

    <div id="thank-you-screen" class="hidden bg-white p-12 rounded-2xl shadow-xl w-full max-w-md text-center border-t-8 border-emerald-500">
        <div class="mb-6 text-emerald-500">
            <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-4">Submitted!</h2>
        <p class="text-slate-600 mb-8">Your quiz responses have been recorded successfully.</p>
        <div class="p-4 bg-slate-50 rounded-xl border text-sm text-slate-500 italic">You may now close this window.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnG3Hk8AfZoG0fcI6QMwRLReUNcEFLcz8",
            authDomain: "cwseunnati.firebaseapp.com",
            projectId: "cwseunnati",
            storageBucket: "cwseunnati.firebasestorage.app",
            messagingSenderId: "557397468479",
            appId: "1:557397468479:web:55ff3a96b5c2b7f33c1f8a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let questions = [], currentIndex = 0, timeLeft = 0, timerInterval, userAnswers = {};
        let isQuizActiveInUI = false, questionLimit = 0; 

        window.onload = () => { if (localStorage.getItem("posh_quiz_submitted") === "true") showThankYou(); };

        db.collection('settings').doc('quizStatus').onSnapshot(doc => {
            if(!doc.exists || localStorage.getItem("posh_quiz_submitted") === "true") return;
            const d = doc.data();
            const btn = document.getElementById('start-btn'), msg = document.getElementById('wait-msg');
            questionLimit = d.questionLimit || 0;
            if(d.active) {
                btn.classList.remove('hidden'); msg.classList.add('hidden');
                document.getElementById('set-time-display').innerText = d.duration || 10;
                if(timeLeft === 0) timeLeft = (d.duration || 10) * 60;
            } else {
                btn.classList.add('hidden'); msg.classList.remove('hidden');
                if(isQuizActiveInUI) submitFinal();
            }
        });

        async function startQuiz() {
            const name = document.getElementById('userName').value, 
                  roll = document.getElementById('rollNo').value,
                  email = document.getElementById('userEmail').value;
            if(!name || !roll || !email) return alert("Please fill all fields.");

            const qSnap = await db.collection('questions').get();
            questions = qSnap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            
            // Shuffle and Limit
            questions.sort(() => Math.random() - 0.5);
            if(questionLimit > 0) questions = questions.slice(0, questionLimit);
            
            isQuizActiveInUI = true;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion(); 
            startTimer();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('q-count').innerText = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('q-text').innerText = q.text;
            
            const mcqBox = document.getElementById('mcq-container');
            const typeBox = document.getElementById('typing-container');
            const inputField = document.getElementById('typing-input');

            if(q.type === 'typing') {
                mcqBox.classList.add('hidden');
                typeBox.classList.remove('hidden');
                inputField.value = '';
                inputField.focus();
            } else {
                typeBox.classList.add('hidden');
                mcqBox.classList.remove('hidden');
                mcqBox.innerHTML = '';
                q.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition font-semibold text-slate-700";
                    b.innerText = opt;
                    b.onclick = () => { recordAnswer(opt); nextStep(); };
                    mcqBox.appendChild(b);
                });
            }
        }

        function submitTypedAnswer() {
            const val = document.getElementById('typing-input').value;
            recordAnswer(val);
            nextStep();
        }

        function recordAnswer(val) {
            const q = questions[currentIndex];
            // Normalize for comparison: trim whitespace and lowercase
            const cleanUser = val.trim().toLowerCase();
            const cleanCorrect = q.correct.trim().toLowerCase();
            const isCorrect = cleanUser === cleanCorrect;
            userAnswers[currentIndex] = { pts: isCorrect ? q.points : 0 };
        }

        function nextStep() { 
            currentIndex++; 
            if(currentIndex < questions.length) showQuestion(); 
            else submitFinal(); 
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) submitFinal();
            }, 1000);
        }

        async function submitFinal() {
            if(!isQuizActiveInUI) return;
            isQuizActiveInUI = false;
            clearInterval(timerInterval);
            
            let totalScore = 0;
            Object.values(userAnswers).forEach(a => totalScore += parseInt(a.pts || 0));

            try {
                await db.collection('submissions').add({
                    name: document.getElementById('userName').value,
                    rollNo: document.getElementById('rollNo').value,
                    email: document.getElementById('userEmail').value,
                    score: totalScore,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                localStorage.setItem("posh_quiz_submitted", "true");
                showThankYou();
            } catch (e) { alert("Error saving response."); }
        }

        function showThankYou() {
            document.querySelectorAll('div[id$="-screen"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('thank-you-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
